name: Coleta de Dados de Mercado

# Roda a cada 10 minutos. O push do latest.json aciona o Netlify automaticamente.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coletor
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: '1'
        run: |
          python collector.py > crypto-dashboard/data/latest.json

      - name: Commit e push do latest.json
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git pull --rebase origin main
          git add crypto-dashboard/data/latest.json
          git diff --staged --quiet || \
            git commit -m "data: atualização automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
