name: Coleta de Dados de Mercado

on:
  schedule:
    - cron: '*/5 * * * *'   # roda a cada 5 minutos
  workflow_dispatch:          # permite acionar manualmente pelo GitHub

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Rodar script de coleta
        run: |
          python collector.py > crypto-dashboard/data/latest.json

      - name: Salvar dados no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto-dashboard/data/latest.json
          git diff --staged --quiet || git commit -m "data: atualização automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
