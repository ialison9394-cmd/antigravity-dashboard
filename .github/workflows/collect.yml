name: Coleta de Dados de Mercado

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# Dá permissão de leitura + escrita ao GITHUB_TOKEN nativo
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coletor
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: '1'
        run: |
          python collector.py > crypto-dashboard/data/latest.json
          python -c "
          import json
          d = json.load(open('crypto-dashboard/data/latest.json'))
          a = d.get('assets', [])
          m = d.get('macro', {})
          print(f'OK: {len(a)} ativos | BTC \${m.get(\"btc_price\",0)} | {m.get(\"scenario\",\"?\")}')
          "

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto-dashboard/data/latest.json
          if git diff --staged --quiet; then
            echo "Sem alterações — nenhum commit."
          else
            git commit -m "data: atualização automática $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
